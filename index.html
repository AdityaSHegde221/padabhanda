<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>n*n padabhanda(aditya)</title>
<style>
body { font-family: Arial; text-align: center; }
.grid {
  display: grid;
  gap: 0;
  margin: 20px auto;
}
.cell {
  width: 45px;
  height: 45px;
  border: 0.5px solid #999;
  box-sizing: border-box;
  position: relative;
  cursor: pointer;
}
.white { background: white; }
.black { background: black; }
.number {
  position: absolute;
  top: 2px;
  left: 4px;
  font-size: 10px;
  font-weight: bold;
  color: black;
}
button, input { margin: 10px; padding: 8px; }
</style>
</head>
<body>

<h2>N x N Crossword Editor</h2>
<p>Click = black/white | Double click = number</p>

<input type="number" id="sizeInput" placeholder="Enter grid size (e.g. 11)">
<button onclick="createGrid()">Create Grid</button>

<div id="grid" class="grid"></div>

<button onclick="savePuzzle()">Save</button>
<button onclick="loadPuzzle()">Load</button>

<script>
let size = 0;
let gridData = [];
let numberData = [];

const grid = document.getElementById("grid");

function createGrid() {
  size = parseInt(document.getElementById("sizeInput").value);
  if (!size || size < 2) {
    alert("Enter valid size");
    return;
  }

  grid.style.gridTemplateColumns = `repeat(${size}, 45px)`;

  gridData = Array(size).fill().map(() => Array(size).fill(0));
  numberData = Array(size).fill().map(() => Array(size).fill(""));

  drawGrid();
}

function drawGrid() {
  grid.innerHTML = "";

  for (let i = 0; i < size; i++) {
    for (let j = 0; j < size; j++) {
      const cell = document.createElement("div");
      cell.className = "cell " + (gridData[i][j] ? "black" : "white");

      if (!gridData[i][j] && numberData[i][j]) {
        const span = document.createElement("span");
        span.className = "number";
        span.innerText = numberData[i][j];
        cell.appendChild(span);
      }

      cell.addEventListener("click", function(e) {
        e.preventDefault();
        gridData[i][j] = gridData[i][j] ? 0 : 1;
        if (gridData[i][j] === 1) numberData[i][j] = "";
        drawGrid();
      });

      cell.addEventListener("dblclick", function(e) {
        e.preventDefault();
        if (gridData[i][j] === 0) {
          let num = prompt("Enter number:", numberData[i][j]);
          if (num !== null) numberData[i][j] = num;
          drawGrid();
        }
      });

      grid.appendChild(cell);
    }
  }
}

function savePuzzle() {
  const data = { size, gridData, numberData };
  localStorage.setItem("crossword", JSON.stringify(data));
  alert("Saved!");
}

function loadPuzzle() {
  const data = JSON.parse(localStorage.getItem("crossword"));
  if (data) {
    size = data.size;
    gridData = data.gridData;
    numberData = data.numberData;
    document.getElementById("sizeInput").value = size;
    grid.style.gridTemplateColumns = `repeat(${size}, 45px)`;
    drawGrid();
  }
}
</script>

</body>
</html>
